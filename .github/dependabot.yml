version: 2
updates:
  # Maintain Go dependencies
  - package-ecosystem: "gomod"
    directory: "/"
    schedule:
      interval: "weekly"
    labels:
      - "security"
      - "dependencies"

  # Maintain GitHub Actions (keeps setup-buildx-action, etc. up to date)
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"

  # Maintain Dockerfile base images (golang:alpine)
  - package-ecosystem: "docker"
    directory: "/"
    schedule:
      interval: "weekly"
